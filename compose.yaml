services:
  db:
    container_name: dev-lovers-db
    build: ./images/postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/create_table.sql
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    env_file:
      - .env
